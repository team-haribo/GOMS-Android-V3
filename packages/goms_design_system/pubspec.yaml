name: goms_design_system
description: Shared GOMS design tokens, themes, icons, typography, and layout primitives.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.3
  flutter_riverpod: ^3.2.1
  json_annotation: ^4.9.0
  image_fade: ^0.6.2
  responsive_framework: ^1.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/icons/
  fonts:
    - family: suit
      fonts:
        - asset: assets/fonts/suit/SUIT-Regular.ttf
          weight: 400
        - asset: assets/fonts/suit/SUIT-Medium.ttf
          weight: 500
        - asset: assets/fonts/suit/SUIT-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/suit/SUIT-Bold.ttf
          weight: 700
    - family: gmarketSans
      fonts:
        - asset: assets/fonts/gmarketSans/GmarketSansTTFLight.ttf
          weight: 300
        - asset: assets/fonts/gmarketSans/GmarketSansTTFMedium.ttf
          weight: 500
        - asset: assets/fonts/gmarketSans/GmarketSansTTFBold.ttf
          weight: 700
